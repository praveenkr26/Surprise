<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Pacifico&family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <!-- Screen 1: Input -->
    <div id="input-screen" class="screen active">
        <div class="glass-card">
            <input type="text" id="name-input" placeholder="Enter Name..." autocomplete="off" autofocus>
            <button id="enter-btn">Enter</button>
        </div>
    </div>

    <!-- Screen 1.5: Countdown -->
    <div id="countdown-screen" class="screen">
        <h1 id="countdown-number" class="elegant-name" style="font-size: 10rem;">3</h1>
    </div>

    <!-- Screen 2: Celebration -->
    <div id="celebration-screen" class="screen">
        <h2 class="hb-text">Happy Birthday!</h2>
        <div id="greeting-text"></div>
        
        <div class="human-wish-container">
            <p class="human-wish">May this special day bring you endless joy and tons of precious memories! You deserve all the wonderful things in this world. Have a fabulous and magical birthday! ✨</p>
        </div>

        <div class="balloons-container" id="balloons-container"></div>
        
        <div class="bunting-container">
            <div class="bunting-string">
                <span class="flag" style="--c: #ff6b81;">H</span>
                <span class="flag" style="--c: #48dbfb;">A</span>
                <span class="flag" style="--c: #1dd1a1;">P</span>
                <span class="flag" style="--c: #feca57;">P</span>
                <span class="flag" style="--c: #ff9f43;">Y</span>
            </div>
            <div class="bunting-string" style="margin-top: 15px;">
                <span class="flag" style="--c: #ff6b81;">B</span>
                <span class="flag" style="--c: #1dd1a1;">I</span>
                <span class="flag" style="--c: #0a3d62;">R</span>
                <span class="flag" style="--c: #48dbfb;">T</span>
                <span class="flag" style="--c: #feca57;">H</span>
                <span class="flag" style="--c: #ff9f43;">D</span>
                <span class="flag" style="--c: #ff6b81;">A</span>
                <span class="flag" style="--c: #1dd1a1;">Y</span>
            </div>
        </div>
        
        <h1 id="greeting-text" class="elegant-name"><span id="bday-name"></span></h1>
        
        <div class="cute-cake-container" id="cute-cake">
            <div class="cute-cake">
                <img src="https://png.pngtree.com/png-clipart/20250111/original/pngtree-layered-cake-with-red-icing-and-candy-toppings-png-image_19080074.png" alt="Cute Cake" class="cake-img">
            </div>
            <p class="cute-instruction">Tap for Magic! ✨</p>
        </div>

        <div class="controls">
            <button id="music-btn" class="control-btn">🔊 Stop Music</button>
            <button id="shayari-btn" class="control-btn">✨ Show Shayari</button>
        </div>
    </div>

    <!-- Shayari Modal -->
    <div id="shayari-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn">&times;</span>
            <h2>For You, <span id="shayari-name"></span></h2>
            <p id="shayari-text"></p>
        </div>
    </div>

    <!-- Hidden YouTube Player -->
    <div id="yt-player" style="position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none;"></div>

    <script src="script.js"></script>
</body>
</html>
